<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X 关注清理助手</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1 data-i18n="appName">X 关注清理助手</h1>
          <p data-i18n="localOnly">本地运行，不自动取关</p>
        </div>
      </header>

      <section class="stats-grid" aria-label="账户统计">
        <article class="stat-card">
          <span class="stat-label" data-i18n="totalAccounts">已采集账户</span>
          <strong id="totalAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="confirmedInactive">已确认未活跃</span>
          <strong id="inactiveAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="needsReview">待复核</span>
          <strong id="reviewAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="recentlyActive">近期活跃</span>
          <strong id="activeAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="unknown">无法判断</span>
          <strong id="unknownAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="whitelist">白名单</span>
          <strong id="whitelistedAccounts">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" data-i18n="processed">已处理</span>
          <strong id="processedAccounts">0</strong>
        </article>
      </section>

      <p id="statusMessage" class="status-message" role="status" data-i18n="waiting">等待用户手动操作。</p>

      <section class="actions" aria-label="操作">
        <button id="scanCurrentPage" type="button" data-i18n="scanCurrentPage">扫描当前页面</button>
        <button id="readProfileActivity" type="button" data-i18n="readProfile">读取当前主页最近发帖时间</button>
        <button id="openResults" type="button" data-i18n="openResults">查看结果</button>
        <button id="openOptions" type="button" data-i18n="openOptions">打开设置</button>
        <button id="clearLocalData" class="danger-button" type="button" data-i18n="clearData">清空本地数据</button>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
