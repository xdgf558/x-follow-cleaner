<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Follow Cleaner Results</title>
    <link rel="stylesheet" href="./results.css">
  </head>
  <body>
    <main class="results-shell">
      <header class="results-header">
        <div>
          <p class="eyebrow">X Follow Cleaner</p>
          <h1 data-i18n="resultsTitle">关注账户结果</h1>
        </div>
        <div class="header-actions">
          <button id="exportCsv" type="button" data-i18n="exportCsv">导出 CSV</button>
          <button id="exportJson" type="button" data-i18n="exportJson">导出 JSON</button>
          <button id="refreshResults" type="button" data-i18n="refresh">刷新</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="账户统计">
        <article>
          <span data-i18n="allAccounts">全部账户</span>
          <strong id="summaryTotal">0</strong>
        </article>
        <article>
          <span data-i18n="inactiveTab">已确认未活跃</span>
          <strong id="summaryInactive">0</strong>
        </article>
        <article>
          <span data-i18n="reviewTab">待复核</span>
          <strong id="summaryReview">0</strong>
        </article>
        <article>
          <span data-i18n="activeTab">近期活跃</span>
          <strong id="summaryActive">0</strong>
        </article>
        <article>
          <span data-i18n="unknownTab">无法判断</span>
          <strong id="summaryUnknown">0</strong>
        </article>
        <article>
          <span data-i18n="followsYouTab">关注你</span>
          <strong id="summaryFollowsYou">0</strong>
        </article>
        <article>
          <span data-i18n="suspectedUnfollowTab">疑似取关</span>
          <strong id="summarySuspectedUnfollow">0</strong>
        </article>
        <article>
          <span data-i18n="whitelistTab">白名单</span>
          <strong id="summaryWhitelisted">0</strong>
        </article>
        <article>
          <span data-i18n="processedTab">已处理</span>
          <strong id="summaryProcessed">0</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="结果筛选">
        <label>
          <span data-i18n="searchUsername">搜索 username</span>
          <input id="searchInput" type="search" placeholder="例如 openai" data-i18n-placeholder="searchPlaceholder">
        </label>
      </section>

      <section class="batch-panel" aria-label="低频自动检查">
        <div>
          <h2 data-i18n="batchCheck">低频自动检查</h2>
          <p id="batchStatus">默认关闭。可在设置页开启后，从当前结果中低频逐个打开主页检查。</p>
        </div>
        <div class="batch-actions">
          <button id="startBatchCheck" type="button" data-i18n="startBatch">开始低频检查</button>
          <button id="recheckInactive" type="button" data-i18n="recheckInactive">复核未活跃</button>
          <button id="recheckUnknown" type="button" data-i18n="recheckUnknown">重查无法判断</button>
          <button id="pauseBatchCheck" type="button" disabled data-i18n="pause">暂停</button>
        </div>
      </section>

      <nav class="tabs" aria-label="结果标签">
        <button class="tab-button active" type="button" data-filter="all" data-i18n="allAccounts">全部账户</button>
        <button class="tab-button" type="button" data-filter="inactive" data-i18n="inactiveTab">已确认未活跃</button>
        <button class="tab-button" type="button" data-filter="review" data-i18n="reviewTab">待复核</button>
        <button class="tab-button" type="button" data-filter="active" data-i18n="activeTab">近期活跃</button>
        <button class="tab-button" type="button" data-filter="unknown" data-i18n="unknownTab">无法判断</button>
        <button class="tab-button" type="button" data-filter="followsYou" data-i18n="followsYouTab">关注你</button>
        <button class="tab-button" type="button" data-filter="notFollowingYou" data-i18n="notFollowingYouTab">未关注你</button>
        <button class="tab-button" type="button" data-filter="suspectedUnfollow" data-i18n="suspectedUnfollowTab">疑似取关</button>
        <button class="tab-button" type="button" data-filter="whitelisted" data-i18n="whitelistTab">白名单</button>
        <button class="tab-button" type="button" data-filter="processed" data-i18n="processedTab">已处理</button>
      </nav>

      <section class="account-list" id="accountList" aria-live="polite"></section>

      <template id="accountRowTemplate">
        <article class="account-row">
          <div class="avatar-wrap"></div>
          <div class="account-main">
            <div class="account-title">
              <h2 class="display-name"></h2>
              <span class="status-badge"></span>
            </div>
            <p class="username"></p>
            <dl class="account-meta">
              <div>
                <dt data-i18n="lastPostAt">最近发帖时间</dt>
                <dd class="last-post"></dd>
              </div>
              <div>
                <dt data-i18n="inactiveDays">未活跃天数</dt>
                <dd class="inactive-days"></dd>
              </div>
              <div>
                <dt data-i18n="confirmation">二次确认</dt>
                <dd class="confirmation-count"></dd>
              </div>
              <div>
                <dt data-i18n="mutualFollow">是否关注你</dt>
                <dd class="mutual-follow"></dd>
              </div>
              <div>
                <dt data-i18n="mutualFollowCheckedAt">互关检查时间</dt>
                <dd class="mutual-follow-checked-at"></dd>
              </div>
              <div>
                <dt data-i18n="checkedAt">检查时间</dt>
                <dd class="checked-at"></dd>
              </div>
              <div>
                <dt data-i18n="rawTime">原始时间</dt>
                <dd class="source-text"></dd>
              </div>
              <div>
                <dt data-i18n="evidence">读取依据</dt>
                <dd class="evidence-link"></dd>
              </div>
            </dl>
          </div>
          <div class="row-actions">
            <button type="button" data-action="open" data-i18n="openProfile">打开主页</button>
            <button type="button" data-action="recheck" data-i18n="recheck">重新检查</button>
            <button type="button" data-action="processed">标记已处理</button>
            <button type="button" data-action="whitelist">加入白名单</button>
          </div>
        </article>
      </template>
    </main>

    <script type="module" src="./results.js"></script>
  </body>
</html>
